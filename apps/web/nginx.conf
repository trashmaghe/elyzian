server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Vite content-hashes files under assets/, so they're safe to cache forever.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # index.html references those hashed filenames and changes every build —
    # must never be aggressively cached, but conditional revalidation is fine.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA client-side routing fallback (e.g. /channels/:channelId).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
