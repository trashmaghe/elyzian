# Requires the metrics-server add-on to be installed in the target cluster -
# this manifest does not install it, only assumes it's present.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: munichat-api
  namespace: munichat
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: munichat-api
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
